global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 1h
  receiver: 'console-logger'

  # Route critical alerts separately
  routes:
    - match:
        severity: critical
      receiver: 'console-logger'
      group_wait: 5s

receivers:
  - name: 'console-logger'
    webhook_configs:
      - url: 'http://mlops-app:8000/alerts/webhook'
        send_resolved: true
