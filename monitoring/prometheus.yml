global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Load alert rules
rule_files:
  - /etc/prometheus/alert_rules.yml

# Where to send alerts (Alertmanager)
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "mlops-app"
    static_configs:
      - targets: ["mlops-app:8000"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
